# =====================================================================
# Boss Engineers ERP — Render blueprint (API + managed Postgres)
# Docs: https://render.com/docs/blueprint-spec
# One-time DB bootstrap (schema + login role + admin password) is a manual step
# the first time — see DEPLOY.md. Each deploy runs migrations via preDeployCommand.
# =====================================================================
databases:
  - name: be-erp-db
    databaseName: boss_engineers_erp
    plan: free                   # 30-day free Postgres; upgrade for a real client
    postgresMajorVersion: "16"

services:
  - type: web
    name: be-erp-api
    runtime: docker
    dockerfilePath: app/Dockerfile
    dockerContext: app
    plan: free                   # sleeps when idle; upgrade to 'starter' for always-on
    healthCheckPath: /health
    # NOTE: Render free tier does not allow preDeployCommand, so migrations are
    # applied by the one-time bootstrap (app/scripts/bootstrap-prod.sh, run as the
    # DB owner) and re-run manually as owner after schema changes. On a paid plan
    # you can add:  preDeployCommand: node dist/scripts/migrate.js  (with
    # MIGRATE_DATABASE_URL set to the owner connection string) to auto-migrate.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        # The RLS-enforced app role. After the one-time bootstrap (DEPLOY.md / §Render)
        # creates erp_app_login, set this to that connection string in the dashboard
        # (take the Internal Database URL and swap the user to erp_app_login).
        sync: false
      - key: AUTH_JWT_SECRET
        generateValue: true       # Render generates a strong random secret
      - key: AUTH_JWT_TTL
        value: 8h
      - key: CORS_ORIGINS
        sync: false               # set to your frontend/desktop origin(s)
      - key: LOG_LEVEL
        value: info
      - key: SMTP_URL
        sync: false               # optional; omit to use the in-memory outbox
      - key: MAIL_FROM
        sync: false
