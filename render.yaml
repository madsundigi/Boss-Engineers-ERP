# =====================================================================
# Boss Engineers ERP — Render blueprint (API + managed Postgres)
# Docs: https://render.com/docs/blueprint-spec
# One-time DB bootstrap (schema + login role + admin password) is a manual step
# the first time — see DEPLOY.md. Each deploy runs migrations via preDeployCommand.
# =====================================================================
databases:
  - name: be-erp-db
    databaseName: boss_engineers_erp
    plan: free                   # 30-day free Postgres; upgrade for a real client
    postgresMajorVersion: "16"

services:
  - type: web
    name: be-erp-api
    runtime: docker
    dockerfilePath: app/Dockerfile
    dockerContext: app
    plan: free                   # sleeps when idle; upgrade to 'starter' for always-on
    healthCheckPath: /health
    # Migrations AUTO-APPLY on container start (the Docker entrypoint runs the
    # migrator) WHEN MIGRATE_DATABASE_URL is set to the DB OWNER connection string
    # — the runtime DATABASE_URL is the restricted erp_app_login, which has no DDL.
    # This works on the free tier (which forbids preDeployCommand). Leave
    # MIGRATE_DATABASE_URL unset to keep migrations a manual owner step
    # (app/scripts/bootstrap-prod.sh). One-time DB bootstrap is still manual.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        # The RLS-enforced app role. After the one-time bootstrap (DEPLOY.md / §Render)
        # creates erp_app_login, set this to that connection string in the dashboard
        # (take the Internal Database URL and swap the user to erp_app_login).
        sync: false
      - key: MIGRATE_DATABASE_URL
        # OWNER connection string (the Internal Database URL with the original owner
        # user — NOT erp_app_login). Set this in the dashboard to auto-apply pending
        # migrations on every deploy. Leave unset to migrate manually as owner.
        sync: false
      - key: AUTH_JWT_SECRET
        generateValue: true       # Render generates a strong random secret
      - key: AUTH_JWT_TTL
        value: 8h
      - key: CORS_ORIGINS
        sync: false               # set to your frontend/desktop origin(s)
      - key: LOG_LEVEL
        value: info
      - key: SMTP_URL
        sync: false               # optional; omit to use the in-memory outbox
      - key: MAIL_FROM
        sync: false
