name: CI

# Build, type-check, audit and test the application layer on every push / PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  # ---------------------------------------------------------------
  # Job 1 — static checks + unit tests (no database).
  # ---------------------------------------------------------------
  build-and-check:
    name: Build, typecheck, audit, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Dependency audit (fail on High+)
        run: npm audit --audit-level=high

      - name: Unit tests
        env:
          NODE_ENV: test
        run: npm test

  # ---------------------------------------------------------------
  # Job 2 — full schema build + integration tests against PostgreSQL 16.
  # ---------------------------------------------------------------
  db-integration:
    name: Schema build + integration tests (postgres:16)
    runs-on: ubuntu-latest
    needs: build-and-check

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: be
        ports:
          - 5432:5432
        # Wait until the server is accepting connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGPASSWORD: postgres
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/be
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Build base schema
        # Run from the repo root so the \ir relative paths in 00_run_all.sql resolve.
        working-directory: ${{ github.workspace }}
        run: psql -h localhost -U postgres -d be -v ON_ERROR_STOP=1 -f db/00_run_all.sql

      - name: Apply module migrations (in order)
        working-directory: ${{ github.workspace }}
        run: |
          for f in app/migrations/*.sql; do
            echo "applying $f"
            psql -h localhost -U postgres -d be -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Install dependencies
        run: npm ci

      - name: Integration tests
        run: npm test
